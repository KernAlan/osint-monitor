# Alert configuration
# Updated: 2026-03-16

rules:
  # Compound rules (entity + keyword co-occurrence)
  - name: "Iran nuclear escalation"
    type: compound
    conditions:
      entity: "Iran"
      keyword: "nuclear"
    severity: 0.9
    cooldown_minutes: 120
    channels: ["desktop", "slack"]

  - name: "China Taiwan military"
    type: compound
    conditions:
      entity: "Taiwan"
      keyword: "military"
    severity: 0.85
    cooldown_minutes: 120
    channels: ["desktop"]

  - name: "Russia nuclear"
    type: compound
    conditions:
      entity: "Russia"
      keyword: "nuclear"
    severity: 0.95
    cooldown_minutes: 60
    channels: ["desktop", "slack"]

channels:
  - type: desktop
    enabled: true
    config: {}

  # Uncomment and configure as needed:
