# OSINT Sources Configuration
# Updated: 2026-03-19

# Tiered polling intervals (seconds)
# Hot:  pre-narrative signals (ADS-B, BGP, DNS, currency, commodities, defense stocks, seismic)
# Warm: news and social (RSS, Nitter, travel advisories, OONI, flight routes, GDELT, cables)
# Cold: slow-updating datasets (FIRMS, USGS, ACLED, sanctions, NVD, UNHCR, IAEA, SEC, finance)
tiers:
  hot_interval_seconds: 150    # 2.5 min
  warm_interval_seconds: 600   # 10 min
  cold_interval_seconds: 3600  # 60 min

# RSS Feeds - these work without API keys
rss_feeds:
  # US Government (credibility: 1.0)
  - name: "Defense.gov"
    url: "https://www.defense.gov/news/feed/"
    category: "us_gov"
    credibility_score: 1.0
    priority: 1
    poll_interval: 900

  - name: "State Department"
    url: "https://www.state.gov/rss/press-releases/"
    category: "us_gov"
    credibility_score: 1.0
    priority: 1
    poll_interval: 900

  # Wire Services (credibility: 0.9)
  - name: "Reuters World"
    url: "https://www.reutersagency.com/feed/?taxonomy=best-topics&post_type=best"
    category: "news"
    credibility_score: 0.9
    priority: 1
    poll_interval: 600

  # Major International News (credibility: 0.8)
  - name: "BBC World"
    url: "https://feeds.bbci.co.uk/news/world/rss.xml"
    category: "news"
    credibility_score: 0.8
    priority: 1
    poll_interval: 600

  - name: "Al Jazeera"
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    category: "news"
    credibility_score: 0.8
    priority: 1
    poll_interval: 600

  - name: "South China Morning Post"
    url: "https://www.scmp.com/rss/91/feed"
    category: "news"
    credibility_score: 0.8
    priority: 2
    poll_interval: 1800

  # Specialty Analysis (credibility: 0.7)
  - name: "War on the Rocks"
    url: "https://warontherocks.com/feed/"
    category: "analysis"
    credibility_score: 0.7
    priority: 1
    poll_interval: 3600

  - name: "Lawfare"
    url: "https://www.lawfaremedia.org/feed"
    category: "analysis"
    credibility_score: 0.7
    priority: 2
    poll_interval: 3600

  - name: "CSIS"
    url: "https://www.csis.org/rss.xml"
    category: "analysis"
    credibility_score: 0.7
    priority: 2
    poll_interval: 3600

  # Defense Industry (credibility: 0.7)
  - name: "Defense News"
    url: "https://www.defensenews.com/arc/outboundfeeds/rss/"
    category: "defense"
    credibility_score: 0.7
    priority: 2
    poll_interval: 1800

  - name: "Breaking Defense"
    url: "https://breakingdefense.com/feed/"
    category: "defense"
    credibility_score: 0.7
    priority: 2
    poll_interval: 1800

# Nitter instances for Twitter/X (no API needed)
nitter_instances:
