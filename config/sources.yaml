# Alert keywords (immediate notification)
alert_keywords:
  critical:
    - "DEFCON"
    - "nuclear weapon"
    - "missile launch detected"
    - "declaration of war"
    - "military mobilization"
    - "Article 5"
    - "nuclear strike"
    - "WMD"

  high:
    - "troop movement"
    - "naval deployment"
    - "air strike"
    - "embassy evacuated"
    - "energy infrastructure attack"
    - "cyber attack"
    - "missile strike"
    - "invasion"
    - "drone strike"
    - "chemical weapon"
    - "biological weapon"
    - "martial law"
    - "blockade"
    - "no-fly zone"

# Region focus
regions:
  iran:
    keywords: ["Iran", "Tehran", "IRGC", "Persian Gulf", "Strait of Hormuz", "Isfahan", "Natanz", "Fordow"]
    priority: 1

  china:
    keywords: ["China", "Beijing", "Taiwan", "South China Sea", "PLA", "Xi Jinping", "Taipei", "PLAN"]
    priority: 1

  russia:
    keywords: ["Russia", "Moscow", "Ukraine", "Kremlin", "Putin", "NATO", "Kyiv", "Donbas", "Crimea"]
    priority: 1

  middle_east:
    keywords: ["Israel", "Gaza", "Syria", "Lebanon", "Yemen", "Saudi Arabia", "Hezbollah", "Hamas", "Houthi", "IDF"]
    priority: 2

  north_korea:
    keywords: ["North Korea", "DPRK", "Pyongyang", "Kim Jong Un", "Korean Peninsula"]
    priority: 2

  africa:
    keywords: ["Sahel", "Wagner Africa", "Sudan", "Ethiopia", "Somalia", "Libya", "Niger coup"]
    priority: 3
