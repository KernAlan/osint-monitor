# Alert keywords (immediate notification)
alert_keywords:
  critical:
    - "DEFCON"
    - "nuclear weapon"
    - "missile launch detected"
    - "declaration of war"
    - "military mobilization"
    - "Article 5"
    
  high:
    - "troop movement"
    - "naval deployment"
    - "air strike"
    - "embassy evacuated"
    - "energy infrastructure attack"
    - "cyber attack"
    - "missile strike"
    - "invasion"

# Region focus
regions:
  iran:
    keywords: ["Iran", "Tehran", "IRGC", "Persian Gulf", "Strait of Hormuz", "Isfahan", "Natanz"]
    priority: 1
    
  china:
    keywords: ["China", "Beijing", "Taiwan", "South China Sea", "PLA", "Xi Jinping"]
    priority: 1
    
  russia:
    keywords: ["Russia", "Moscow", "Ukraine", "Kremlin", "Putin", "NATO"]
    priority: 1
    
  middle_east:
    keywords: ["Israel", "Gaza", "Syria", "Lebanon", "Yemen", "Saudi Arabia"]
    priority: 2
