services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: osint_monitor
      POSTGRES_USER: osint
      POSTGRES_PASSWORD: osint_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
